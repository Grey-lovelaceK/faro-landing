<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Analiza tu web gratis — Faro°</title>
<meta name="description" content="Analizador gratuito de web: SEO, redes, AEO/GEO (visibilidad en IA) y técnico. Pon tu URL y obtén tu diagnóstico al instante.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔦</text></svg>">
<style>
  :root{
    --accent:#3D5AFE; --accent-2:#5B72FF; --accent-soft:#E4E8FF;
    --ground:#EEF1F7; --surface:#FFFFFF; --surface-2:#E6EAF2; --border:#D5DBE8;
    --ink:#111420; --muted:#59617A; --faint:#98A0B4;
    --pass:#1f8f5f; --warn:#C9770A; --fail:#D63A3A;
    --mono:ui-monospace,"Cascadia Code","SF Mono",Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  @media (prefers-color-scheme:dark){:root{
    --accent:#5B72FF; --accent-2:#7E90FF; --accent-soft:#171C33;
    --ground:#0A0D17; --surface:#131829; --surface-2:#1A2036; --border:#28304C;
    --ink:#EAEDF6; --muted:#9AA2BC; --faint:#5A6484;
    --pass:#4FB98A; --warn:#E0A24A; --fail:#F0716A;
  }}
  :root[data-theme="dark"]{--accent:#5B72FF;--accent-2:#7E90FF;--accent-soft:#171C33;--ground:#0A0D17;--surface:#131829;--surface-2:#1A2036;--border:#28304C;--ink:#EAEDF6;--muted:#9AA2BC;--faint:#5A6484;--pass:#4FB98A;--warn:#E0A24A;--fail:#F0716A;}
  :root[data-theme="light"]{--accent:#3D5AFE;--accent-2:#5B72FF;--accent-soft:#E4E8FF;--ground:#EEF1F7;--surface:#FFFFFF;--surface-2:#E6EAF2;--border:#D5DBE8;--ink:#111420;--muted:#59617A;--faint:#98A0B4;--pass:#1f8f5f;--warn:#C9770A;--fail:#D63A3A;}
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{background:var(--ground); color:var(--ink); font-family:var(--sans); line-height:1.55; min-height:100vh}
  a{color:var(--accent); text-decoration:none}
  .wrap{max-width:840px; margin:0 auto; padding:24px 20px 80px; position:relative; z-index:1}

  /* Haz de luz de faro — barrido suave desde una "lámpara" superior. Puro CSS. */
  #beam{position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden}
  #beam::before{content:""; position:absolute; top:-150px; left:50%; width:460px; height:460px;
    transform:translateX(-50%); border-radius:50%;
    background:radial-gradient(circle, color-mix(in srgb,var(--accent) 42%, transparent), transparent 62%);
    filter:blur(34px); opacity:.55}
  #beam .sweep{position:absolute; top:-160px; left:50%; width:1100px; height:1100px; margin-left:-550px;
    transform-origin:50% 160px; will-change:transform;
    background:conic-gradient(from -18deg at 50% 160px,
      transparent 0deg,
      color-mix(in srgb,var(--accent) 20%, transparent) 11deg,
      color-mix(in srgb,var(--accent) 6%, transparent) 17deg,
      transparent 26deg);
    animation:sweep 9s ease-in-out infinite}
  @keyframes sweep{0%{transform:rotate(-30deg)} 50%{transform:rotate(30deg)} 100%{transform:rotate(-30deg)}}

  /* Anillo animable: registra --v como número para poder transicionarlo */
  @property --v{syntax:"<number>"; inherits:false; initial-value:0}
  @keyframes rise{from{opacity:0; transform:translateY(14px)} to{opacity:1; transform:none}}
  header{display:flex; align-items:center; gap:14px; padding:6px 0 26px}
  .brand{font-weight:800; letter-spacing:-.03em; font-size:1.2rem}
  .brand b{color:var(--accent)}
  .back{margin-left:auto; font-size:.86rem; color:var(--muted)}
  .back:hover{color:var(--ink)}
  .kicker{font-family:var(--mono); font-size:.72rem; letter-spacing:.16em; text-transform:uppercase; color:var(--accent); font-weight:600}
  h1{font-size:clamp(1.8rem,4vw,2.6rem); letter-spacing:-.03em; line-height:1.05; margin:8px 0 0; text-wrap:balance}
  .sub{color:var(--muted); margin-top:12px; max-width:56ch}
  form{display:flex; gap:10px; margin-top:26px; flex-wrap:wrap}
  input[type=url]{flex:1; min-width:220px; background:var(--surface); border:1px solid var(--border); color:var(--ink); border-radius:12px; padding:14px 16px; font-size:1rem; font-family:var(--mono)}
  input[type=url]:focus{outline:2px solid var(--accent); outline-offset:1px; border-color:transparent}
  button{cursor:pointer; border:none; background:var(--accent); color:#fff; font-weight:700; font-size:1rem; padding:14px 24px; border-radius:12px; font-family:var(--sans); transition:transform .15s, box-shadow .2s}
  button:hover:not(:disabled){transform:translateY(-2px); box-shadow:0 10px 22px -8px var(--accent)}
  button:disabled{opacity:.6; cursor:wait}
  .hint{font-family:var(--mono); font-size:.74rem; color:var(--faint); margin-top:10px}

  #out{margin-top:32px}
  .loading{display:flex; align-items:center; gap:12px; color:var(--muted); font-family:var(--mono); font-size:.9rem}
  .spin{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .err{background:var(--surface); border:1px solid var(--fail); color:var(--fail); border-radius:12px; padding:16px 18px; font-size:.94rem}

  .scorecard{display:flex; gap:24px; align-items:center; background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:24px; flex-wrap:wrap}
  .ring{--v:0; width:118px; height:118px; border-radius:50%; flex:0 0 auto; display:grid; place-items:center;
    background:conic-gradient(var(--rc) calc(var(--v)*1%), var(--surface-2) 0);
    transition:--v 1.2s cubic-bezier(.2,.75,.25,1);
    box-shadow:0 0 34px -8px var(--rc)}
  .ring .inner{width:92px;height:92px;border-radius:50%;background:var(--surface);display:grid;place-items:center;text-align:center}
  .ring .num{font-family:var(--mono);font-weight:700;font-size:2rem;letter-spacing:-.03em;line-height:1}
  .ring .g{font-family:var(--mono);font-size:.7rem;color:var(--muted)}
  .scoremeta{flex:1; min-width:200px}
  .scoremeta h2{margin:0; font-size:1.15rem; letter-spacing:-.02em}
  .scoremeta .u{font-family:var(--mono); font-size:.8rem; color:var(--muted); word-break:break-all; margin-top:4px}
  .tallies{display:flex; gap:14px; margin-top:12px; font-family:var(--mono); font-size:.8rem}
  .tallies .p{color:var(--pass)} .tallies .w{color:var(--warn)} .tallies .f{color:var(--fail)}

  .cats{display:flex; flex-wrap:wrap; gap:10px; margin-top:16px}
  .catpill{flex:1; min-width:140px; background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:12px 14px}
  .catpill .cn{font-family:var(--mono); font-size:.68rem; letter-spacing:.1em; text-transform:uppercase; color:var(--muted)}
  .catpill .cv{font-family:var(--mono); font-weight:700; font-size:1.3rem}
  .track{height:6px;border-radius:99px;background:var(--surface-2);overflow:hidden;margin-top:6px}
  .track>div{height:100%;border-radius:99px;width:0;transition:width 1s cubic-bezier(.2,.75,.25,1) .15s}

  .group{margin-top:26px}
  .group h3{font-family:var(--mono); font-size:.74rem; letter-spacing:.12em; text-transform:uppercase; color:var(--accent); margin:0 0 8px}
  .check{display:flex; gap:12px; padding:12px 0; border-bottom:1px solid var(--border)}
  .ico{flex:0 0 auto;width:20px;height:20px;border-radius:6px;display:grid;place-items:center;font-size:.7rem;font-weight:800;color:#fff;margin-top:2px}
  .ico.pass{background:var(--pass)} .ico.warn{background:var(--warn)} .ico.fail{background:var(--fail)}
  .check .lbl{font-weight:600; font-size:.94rem}
  .check .det{font-family:var(--mono); font-size:.78rem; color:var(--muted); margin-top:2px}
  .check .tip{font-size:.84rem; color:var(--faint); margin-top:4px}
  .psi{margin-top:26px; background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:22px 24px}
  .psi .top{display:flex; align-items:center; gap:16px; flex-wrap:wrap}
  .psi .pscore{font-family:var(--mono); font-weight:700; font-size:2rem; letter-spacing:-.03em; line-height:1}
  .psi .ph{flex:1; min-width:180px}
  .psi .ph h3{margin:0; font-size:1.1rem; letter-spacing:-.02em}
  .psi .ph .sub2{font-family:var(--mono); font-size:.74rem; color:var(--muted); margin-top:3px}
  .psi .badge{font-family:var(--mono); font-size:.66rem; letter-spacing:.08em; text-transform:uppercase; padding:4px 9px; border-radius:999px; border:1px solid var(--border); color:var(--muted)}
  .cwv{display:flex; flex-wrap:wrap; gap:10px; margin-top:16px}
  .cwv .m{flex:1; min-width:120px; background:var(--ground); border:1px solid var(--border); border-radius:12px; padding:12px 14px}
  .cwv .mn{font-family:var(--mono); font-size:.66rem; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); display:flex; align-items:center; gap:6px}
  .cwv .dot{width:9px; height:9px; border-radius:50%; flex:0 0 auto}
  .cwv .mv{font-family:var(--mono); font-weight:700; font-size:1.15rem; margin-top:5px; letter-spacing:-.02em}
  .cwv .mf{font-family:var(--mono); font-size:.68rem; color:var(--faint); margin-top:3px}
  .psi .note{font-family:var(--mono); font-size:.72rem; color:var(--faint); margin:14px 0 0}
  .psi.err{border-color:var(--warn)}

  .ai{margin-top:26px; background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:22px 24px}
  .ai .top{display:flex; align-items:center; gap:14px; flex-wrap:wrap}
  .ai h3{margin:0; font-size:1.1rem; letter-spacing:-.02em; flex:1; min-width:160px}
  .ai .verdict-badge{font-family:var(--mono); font-weight:700; font-size:.72rem; letter-spacing:.06em; text-transform:uppercase; padding:6px 12px; border-radius:999px; color:#fff}
  .ai .vb-si{background:var(--pass)} .ai .vb-parcial{background:var(--warn)} .ai .vb-no{background:var(--fail)}
  .ai .aiscore{font-family:var(--mono); font-weight:700; font-size:1.4rem; letter-spacing:-.02em}
  .ai .verdict{margin:14px 0 0; font-size:.98rem; line-height:1.5}
  .ai .query{margin-top:14px; background:var(--ground); border:1px solid var(--border); border-radius:10px; padding:11px 14px; font-family:var(--mono); font-size:.82rem}
  .ai .query b{color:var(--muted); font-weight:600}
  .ai .cat{font-family:var(--mono); font-size:.72rem; color:var(--muted); margin-top:4px}
  .ai .sect{margin-top:16px}
  .ai .sect h4{font-family:var(--mono); font-size:.7rem; letter-spacing:.1em; text-transform:uppercase; color:var(--accent); margin:0 0 8px}
  .ai ul{margin:0; padding-left:18px}
  .ai li{font-size:.9rem; margin:5px 0; line-height:1.45}
  .ai .note{font-family:var(--mono); font-size:.7rem; color:var(--faint); margin:16px 0 0}
  .ai.err{border-color:var(--warn)}
  .lead{margin-top:30px; background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:24px 26px}
  .lead h3{margin:0 0 6px; font-size:1.15rem; letter-spacing:-.02em}
  .lead p{margin:0 0 16px; color:var(--muted); font-size:.92rem; max-width:52ch}
  .lead form{margin:0; gap:10px}
  .lead input[type=email]{flex:1; min-width:220px; background:var(--ground); border:1px solid var(--border); color:var(--ink); border-radius:12px; padding:13px 15px; font-size:1rem; font-family:var(--mono)}
  .lead input[type=email]:focus{outline:2px solid var(--accent); outline-offset:1px; border-color:transparent}
  .lead .privacy{font-family:var(--mono); font-size:.72rem; color:var(--faint); margin:10px 0 0}
  .lead .ok{display:flex; gap:12px; align-items:flex-start}
  .lead .ok .ico{flex:0 0 auto;width:26px;height:26px;border-radius:8px;display:grid;place-items:center;background:var(--pass);color:#fff;font-weight:800}
  .lead .ok h3{margin:0}
  .lead .leaderr{color:var(--fail); font-size:.84rem; margin:10px 0 0; font-family:var(--mono)}
  .cta{margin-top:30px; background:var(--ink); color:var(--ground); border-radius:18px; padding:28px; text-align:center}
  .cta h3{margin:0 0 8px; font-size:1.3rem; letter-spacing:-.02em; color:var(--ground)}
  .cta p{margin:0 auto 18px; color:color-mix(in srgb,var(--ground) 66%,transparent); max-width:44ch; font-size:.94rem}
  .cta a{display:inline-block; background:var(--accent); color:#fff; font-weight:700; padding:12px 24px; border-radius:999px}

  /* Aparición escalonada de los bloques de resultado */
  #out>*{animation:rise .55s cubic-bezier(.2,.75,.25,1) both}
  #out>*:nth-child(2){animation-delay:.06s}
  #out>*:nth-child(3){animation-delay:.12s}
  #out>*:nth-child(4){animation-delay:.18s}
  #out>*:nth-child(5){animation-delay:.24s}
  #out>*:nth-child(6){animation-delay:.30s}
  #out>*:nth-child(n+7){animation-delay:.36s}

  @media (prefers-reduced-motion:reduce){
    #beam .sweep{animation:none}
    .ring{transition:none}
    .track>div{transition:none}
    #out>*{animation:none}
  }
</style>
</head>
<body>
  <div id="beam" aria-hidden="true"><div class="sweep"></div></div>
  <div class="wrap">
    <header>
      <a href="/" class="brand">Faro<b>°</b></a>
      <a href="/" class="back">← Volver</a>
    </header>

    <span class="kicker">Analizador gratis</span>
    <h1>¿Te encuentran en Google y en la IA?</h1>
    <p class="sub">Pon la URL de tu sitio y en segundos te decimos qué tan listo está para SEO, redes y buscadores con IA (AEO/GEO). Gratis, sin registro.</p>

    <form id="f">
      <input type="url" id="url" placeholder="tunegocio.cl" autocomplete="off" required>
      <button id="btn" type="submit">Analizar</button>
    </form>
    <p class="hint">// no guardamos tu sitio · analizamos la página pública, igual que Google</p>

    <div id="out"></div>
  </div>

<script>
  const f = document.getElementById('f'), out = document.getElementById('out'), btn = document.getElementById('btn');
  const esc = s => String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const rc = v => v >= 70 ? 'var(--pass)' : v >= 40 ? 'var(--warn)' : 'var(--fail)';

  f.addEventListener('submit', async (e) => {
    e.preventDefault();
    const url = document.getElementById('url').value.trim();
    if (!url) return;
    btn.disabled = true; btn.textContent = 'Analizando…';
    out.innerHTML = '<div class="loading"><span class="spin"></span> Revisando ' + esc(url) + '… (10–15 seg)</div>';
    try {
      const r = await fetch('/api/analyze?url=' + encodeURIComponent(url));
      const d = await r.json();
      if (!d.ok) { out.innerHTML = '<div class="err">' + esc(d.error || 'No se pudo analizar.') + '</div>'; return; }
      render(d);
    } catch (err) {
      out.innerHTML = '<div class="err">Error de red. Intenta de nuevo.</div>';
    } finally {
      btn.disabled = false; btn.textContent = 'Analizar';
    }
  });

  function render(d) {
    const col = rc(d.score);
    const order = ['SEO', 'AEO / GEO', 'Social', 'Técnico'];
    const groups = order.filter(o => d.checks.some(c => c.cat === o));

    let h = `
      <div class="scorecard">
        <div class="ring" style="--v:0; --rc:${col}" data-v="${d.score}">
          <div class="inner"><div><div class="num" style="color:${col}" data-to="${d.score}">0</div><div class="g">nota ${d.grade}</div></div></div>
        </div>
        <div class="scoremeta">
          <h2>${veredicto(d.score)}</h2>
          <div class="u">${esc(d.url)}</div>
          <div class="tallies">
            <span class="p">✓ ${d.counts.pass} bien</span>
            <span class="w">▲ ${d.counts.warn} mejorable</span>
            <span class="f">✕ ${d.counts.fail} crítico</span>
          </div>
        </div>
      </div>
      <div class="cats">` +
      d.categories.map(c => `
        <div class="catpill">
          <div class="cn">${esc(c.name)}</div>
          <div class="cv" style="color:${rc(c.score)}" data-to="${c.score}">0</div>
          <div class="track"><div style="background:${rc(c.score)}" data-w="${c.score}"></div></div>
        </div>`).join('') +
      `</div>`;

    for (const g of groups) {
      h += `<div class="group"><h3>${esc(g)}</h3>`;
      for (const c of d.checks.filter(x => x.cat === g)) {
        const sym = c.status === 'pass' ? '✓' : c.status === 'warn' ? '!' : '✕';
        h += `<div class="check">
          <span class="ico ${c.status}">${sym}</span>
          <div>
            <div class="lbl">${esc(c.label)} <span style="color:var(--faint);font-weight:400;font-family:var(--mono);font-size:.78rem">— ${esc(c.detail)}</span></div>
            ${c.status !== 'pass' ? `<div class="tip">${esc(c.tip)}</div>` : ''}
          </div>
        </div>`;
      }
      h += `</div>`;
    }

    h += `<div id="psi-slot"></div>`;
    h += `<div id="ai-slot"></div>`;

    h += `<div class="lead" id="lead">
      <h3>Te enviamos el informe completo</h3>
      <p>Déjanos tu correo y te mandamos este diagnóstico con los pasos concretos para subir tu nota. Sin spam.</p>
      <form id="leadf">
        <input type="email" id="email" placeholder="tucorreo@ejemplo.cl" autocomplete="email" required>
        <button id="leadbtn" type="submit">Enviar informe</button>
      </form>
      <p class="privacy">// solo lo usamos para enviarte el informe y contactarte una vez</p>
    </div>`;

    h += `<div class="cta">
      <h3>¿Quieres que lo dejemos en verde?</h3>
      <p>Te armamos un plan para subir esta nota — o te hacemos la web nueva, ya optimizada para Google y la IA.</p>
      <a href="mailto:greyc9404@gmail.com?subject=Vi%20mi%20an%C3%A1lisis%20-%20quiero%20mejorar%20mi%20web">Hablemos con Faro°</a>
    </div>`;

    out.innerHTML = h;
    animateIn();
    wireLead(d);
    loadPageSpeed(d.url);
    loadAiCheck(d.url);
  }

  const reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // Dispara las transiciones (anillo, barras) y cuenta los números hacia arriba.
  function animateIn() {
    const bars = out.querySelectorAll('.track > div[data-w]');
    const rings = out.querySelectorAll('.ring[data-v]');
    const nums = out.querySelectorAll('[data-to]');
    if (reduceMotion) {
      rings.forEach(el => el.style.setProperty('--v', el.dataset.v));
      bars.forEach(el => el.style.width = el.dataset.w + '%');
      nums.forEach(el => el.textContent = el.dataset.to);
      return;
    }
    requestAnimationFrame(() => requestAnimationFrame(() => {
      rings.forEach(el => el.style.setProperty('--v', el.dataset.v));
      bars.forEach(el => el.style.width = el.dataset.w + '%');
      nums.forEach(el => countUp(el, +el.dataset.to));
    }));
  }

  function countUp(el, to) {
    const dur = 1000, t0 = performance.now();
    const step = (t) => {
      const p = Math.min(1, (t - t0) / dur);
      const eased = 1 - Math.pow(1 - p, 3); // easeOutCubic
      el.textContent = Math.round(to * eased);
      if (p < 1) requestAnimationFrame(step);
      else el.textContent = to;
    };
    requestAnimationFrame(step);
  }

  // ── Chequeo real de IA (¿te cita la IA?) ───────────────────────────────
  async function loadAiCheck(url) {
    const slot = document.getElementById('ai-slot');
    if (!slot) return;
    slot.innerHTML = '<div class="ai"><div class="loading"><span class="spin"></span> ' +
      'Preguntándole a la IA si te mencionaría… (~10 seg)</div></div>';
    try {
      const r = await fetch('/api/aicheck?url=' + encodeURIComponent(url));
      const d = await r.json();
      if (!d.ok) {
        slot.innerHTML = '<div class="ai err"><div class="top"><h3>¿Te menciona la IA?</h3></div>' +
          '<p class="verdict" style="color:var(--muted)">No disponible: ' + esc(d.error || 'no se pudo consultar') + '</p></div>';
        return;
      }
      renderAi(slot, d);
    } catch (err) {
      slot.innerHTML = '<div class="ai err"><div class="top"><h3>¿Te menciona la IA?</h3></div>' +
        '<p class="verdict" style="color:var(--muted)">No se pudo consultar la IA ahora.</p></div>';
    }
  }

  function renderAi(slot, d) {
    const label = { si: 'Sí te cita', parcial: 'A medias', no: 'No te cita' }[d.cited] || '—';
    const scCol = rc(d.aeoScore);
    const reasons = (d.reasons || []).map(x => `<li>${esc(x)}</li>`).join('');
    const actions = (d.actions || []).map(x => `<li>${esc(x)}</li>`).join('');

    slot.innerHTML = `<div class="ai">
      <div class="top">
        <h3>¿Te menciona la IA?</h3>
        <span class="verdict-badge vb-${esc(d.cited)}">${esc(label)}</span>
        <span class="aiscore" style="color:${scCol}">${d.aeoScore}<span style="font-size:.8rem;color:var(--muted)">/100 AEO</span></span>
      </div>
      <div class="cat">${esc(d.category || '—')}${d.location ? ' · ' + esc(d.location) : ''}</div>
      <p class="verdict">${esc(d.verdict)}</p>
      ${d.query ? `<div class="query"><b>consulta simulada:</b> "${esc(d.query)}"</div>` : ''}
      ${reasons ? `<div class="sect"><h4>Por qué</h4><ul>${reasons}</ul></div>` : ''}
      ${actions ? `<div class="sect"><h4>Para que la IA te cite</h4><ul>${actions}</ul></div>` : ''}
      <p class="note">// simulación con IA (${esc(d.model || 'modelo')}) · orientativo, no es la respuesta literal de ChatGPT</p>
    </div>`;
  }

  // ── Rendimiento real (PageSpeed Insights) ──────────────────────────────
  async function loadPageSpeed(url) {
    const slot = document.getElementById('psi-slot');
    if (!slot) return;
    slot.innerHTML = '<div class="psi"><div class="loading"><span class="spin"></span> ' +
      'Midiendo rendimiento real con Google PageSpeed… (puede tardar ~30 seg)</div></div>';
    try {
      const r = await fetch('/api/pagespeed?url=' + encodeURIComponent(url) + '&strategy=mobile');
      const d = await r.json();
      if (!d.ok) {
        slot.innerHTML = '<div class="psi err"><div class="ph"><h3>Rendimiento real</h3>' +
          '<div class="sub2">No disponible: ' + esc(d.error || 'no se pudo medir') + '</div></div></div>';
        return;
      }
      renderPSI(slot, d);
    } catch (err) {
      slot.innerHTML = '<div class="psi err"><div class="ph"><h3>Rendimiento real</h3>' +
        '<div class="sub2">No se pudo medir el rendimiento ahora.</div></div></div>';
    }
  }

  // Umbrales oficiales Core Web Vitals → clase de color
  const cwvColor = (kind, v) => {
    if (v == null) return 'var(--faint)';
    const t = {
      lcp: [2500, 4000], fcp: [1800, 3000], tbt: [200, 600], cls: [0.1, 0.25],
    }[kind];
    if (!t) return 'var(--faint)';
    return v <= t[0] ? 'var(--pass)' : v <= t[1] ? 'var(--warn)' : 'var(--fail)';
  };
  const fieldColor = (cat) =>
    cat === 'FAST' || cat === 'GOOD' ? 'var(--pass)' :
    cat === 'AVERAGE' || cat === 'NEEDS_IMPROVEMENT' ? 'var(--warn)' :
    cat === 'SLOW' ? 'var(--fail)' : 'var(--faint)';

  function renderPSI(slot, d) {
    const sc = d.perfScore;
    const scCol = sc == null ? 'var(--faint)' : rc(sc);
    const lab = d.lab || {};
    const field = d.field || null;

    const metrics = [
      { k: 'lcp', name: 'LCP', full: 'Carga', v: lab.lcp && lab.lcp.ms, disp: lab.lcp && lab.lcp.display, f: field && field.lcp },
      { k: 'cls', name: 'CLS', full: 'Estabilidad', v: lab.cls && lab.cls.value, disp: lab.cls && lab.cls.display, f: field && field.cls, scale: 1 },
      { k: 'tbt', name: 'INP≈', full: 'Interacción (TBT)', v: lab.tbt && lab.tbt.ms, disp: lab.tbt && lab.tbt.display, f: field && field.inp },
      { k: 'fcp', name: 'FCP', full: '1er contenido', v: lab.fcp && lab.fcp.ms, disp: lab.fcp && lab.fcp.display, f: field && field.fcp },
    ];

    const tiles = metrics.map(m => {
      const col = cwvColor(m.k, m.v);
      let f = '';
      if (m.f && m.f.category) {
        const fc = fieldColor(m.f.category);
        const p75 = m.f.p75 != null ? (m.k === 'cls' ? (m.f.p75 / 100).toFixed(2) : (m.f.p75 >= 1000 ? (m.f.p75 / 1000).toFixed(1) + ' s' : m.f.p75 + ' ms')) : '';
        f = `<div class="mf" style="color:${fc}">campo real: ${esc(p75)}</div>`;
      }
      return `<div class="m">
        <div class="mn"><span class="dot" style="background:${col}"></span>${esc(m.name)} · ${esc(m.full)}</div>
        <div class="mv" style="color:${col}">${esc(m.disp || '—')}</div>
        ${f}
      </div>`;
    }).join('');

    slot.innerHTML = `<div class="psi">
      <div class="top">
        <div class="pscore" style="color:${scCol}">${sc == null ? '—' : sc}<span style="font-size:.9rem;color:var(--muted)">/100</span></div>
        <div class="ph">
          <h3>Rendimiento real (Lighthouse)</h3>
          <div class="sub2">medido por Google PageSpeed · vista móvil</div>
        </div>
        <span class="badge">${field ? 'con datos de campo (CrUX)' : 'solo laboratorio'}</span>
      </div>
      <div class="cwv">${tiles}</div>
      <p class="note">// verde = bueno · ámbar = mejorable · rojo = lento, según umbrales Core Web Vitals de Google${field ? '' : ' · sin datos de campo: el sitio tiene poco tráfico para el reporte real de Google'}</p>
    </div>`;
  }

  function wireLead(d) {
    const lf = document.getElementById('leadf');
    if (!lf) return;
    lf.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const lb = document.getElementById('leadbtn');
      const prevErr = document.querySelector('#lead .leaderr');
      if (prevErr) prevErr.remove();
      if (!email) return;
      lb.disabled = true; lb.textContent = 'Enviando…';
      try {
        const r = await fetch('/api/lead', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, url: d.url, score: d.score }),
        });
        const j = await r.json().catch(() => ({}));
        if (!r.ok || !j.ok) throw new Error(j.error || 'error');
        document.getElementById('lead').innerHTML =
          '<div class="ok"><span class="ico">✓</span><div>' +
          '<h3>¡Listo! Te llegará pronto.</h3>' +
          '<p style="margin:6px 0 0">Guardamos tu correo. Te enviamos el informe y te escribimos para ayudarte a subir la nota.</p>' +
          '</div></div>';
      } catch (err) {
        lb.disabled = false; lb.textContent = 'Enviar informe';
        const p = document.createElement('p');
        p.className = 'leaderr';
        p.textContent = (err && err.message && err.message !== 'error') ? err.message : 'No se pudo guardar. Revisa el correo e intenta de nuevo.';
        document.getElementById('leadf').after(p);
      }
    });
  }

  function veredicto(s) {
    if (s >= 85) return 'Excelente — vas muy bien.';
    if (s >= 70) return 'Bien, pero hay que afinar.';
    if (s >= 50) return 'Regular — dejas venta sobre la mesa.';
    if (s >= 30) return 'Débil — te están encontrando poco.';
    return 'Crítico — hoy eres casi invisible.';
  }
</script>
